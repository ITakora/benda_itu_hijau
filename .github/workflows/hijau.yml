name: Commit cheat

on:

  push:
    branches:
      - main
      
  schedule:
  - cron: "0 1/4 * * *"

jobs:
  auto_commit:
    runs-on: ubuntu-latest
    steps:
      - name: Set global directory
        run: git config --global --add safe.directory /github/workspace
      - uses: actions/checkout@v4     
        with:
         persist-credentials: true

     -  name: Modify last update
        run: |
          d=$(date '+%Y-%m-%dT%H:%M:%SZ')
          echo $d > LAST_UPDATED
          
      - name: Commit changes
        run: |
          git config --local user.email "oyamitakora@gmail.com"
          git config --local user.name "ITakora"
          git add -A
          git commit -m "ummm"
          git push origin main
    